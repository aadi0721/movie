<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            justify-content: center;
            align-items: center;
        }
        body {
            background-image: url('space-background-realistic-starry-night-cosmos-shining-stars-milky-way-stardust-color-galaxy.jpg');
            background-size: cover;
            min-height:70vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .container{
            width: 500px;
            height: 500px;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgb(57, 215, 255);
            backdrop-filter: blur(5px);
            justify-content:center;
            text-align:center;
            color:white;
            font-family: Arial, sans-serif;
        }
        
        
    </style>
</head>
<body>
    <div class="container">
    <h1>Clock</h1>
    <h2 class="clock">
        00:00:00
    </h2>
    </div>

    <script>
        function clock() {
            const timeElement = document.getElementsByClassName("clock")[0];
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();

            if (hours < 10) {
                hours = '0' + hours;
            }
            if (minutes < 10) {
                minutes = '0' + minutes;
            }
            if (seconds < 10) {
                seconds = '0' + seconds;
            }

            timeElement.textContent = hours + ':' + minutes + ':' + seconds;
        }
        setInterval(clock, 1000);
        clock();
    </script>
</body>
</html>
